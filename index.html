<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gia Kiên</title>
<style>
body {
font-family: Arial, sans-serif;
margin: 20px;
}

h1 {
text-align: center;
}

.container {
display: grid;
grid-template-columns: 1fr 1fr;
grid-template-rows: auto auto auto auto;
gap: 10px;
}

.header {
grid-column: span 2;
display: grid;
grid-template-columns: 1fr 1fr 1fr;
text-align: center;
}

.header div {
border: 1px solid black;
padding: 8px;
}

.box {
border: 1px solid black;
padding: 10px;
min-height: 150px;
}

.img-box {
border: 1px dashed black;
width: 120px;
height: 120px;
display: flex;
align-items: center;
justify-content: center;
margin-top: 10px;
}

.footer {
grid-column: span 2;
text-align: center;
border: 1px solid black;
padding: 10px;
}
</style>
</head>
<body>

<h1>Gia Kiên</h1>

<div class="container">

<!-- 3 cột trên -->
<div class="header">
<div>Khám phá</div>
<div>Chia sẻ</div>
<div>Trải nghiệm</div>
</div>

<!-- Hàng 1 -->
<div class="box">
<b>Picture</b>
<div class="img-box">Ảnh 1</div>
</div>

<div class="box">
<h3>Introduce</h3>
<p>Tên: Đoàn Trần Gia Kiên</p>
<p>Lớp: 12A6</p>
<p>Địa chỉ: xã Bình Phú</p>
<p>Sở thích: ...</p>
</div>

<!-- Hàng 2 -->
<div class="box">
<div class="img-box">Ảnh 2</div>
</div>

<div class="box">
<p>Tên:..... </p>
<p>Lớp:..... </p>
<p>Địa chỉ:...... </p>
<p>Sở thích: ...</p>
</div>

<!-- Footer -->
<div class="footer">
<p>SĐT: ...</p>
<p>Email: ...</p>
</div>

</div>

</body>
</html>
